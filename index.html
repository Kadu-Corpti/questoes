<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MasterSimulado - Computação</title>
    <style>
        :root { --primary: #2563eb; --bg: #f1f5f9; --text: #1e293b; --success: #22c55e; --danger: #ef4444; }
        body { font-family: 'Inter', system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; padding: 20px; }
        .wrapper { max-width: 700px; margin: auto; }
        .header { text-align: center; margin-bottom: 40px; }
        .card { background: white; border-radius: 16px; padding: 24px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 24px; border: 1px solid #e2e8f0; transition: 0.3s; }
        .q-text { font-size: 1.1rem; font-weight: 600; margin-bottom: 16px; display: block; border-left: 4px solid var(--primary); padding-left: 15px; }
        
        /* Estilo das Opções */
        .option { display: block; background: #f8fafc; padding: 14px 18px; border-radius: 10px; margin-bottom: 8px; cursor: pointer; transition: 0.2s; border: 2px solid transparent; position: relative; }
        .option:hover { background: #f1f5f9; border-color: #cbd5e1; }
        .option input { display: none; } /* Esconde o rádio original */

        /* Feedback Visual */
        .option.correct { background: #dcfce7 !important; border-color: var(--success) !important; color: #166534; font-weight: 600; }
        .option.wrong { background: #fee2e2 !important; border-color: var(--danger) !important; color: #991b1b; opacity: 0.8; }
        .option.disabled { pointer-events: none; cursor: default; }

        .explanation { margin-top: 15px; padding: 15px; border-radius: 10px; font-size: 0.95rem; display: none; animation: fadeIn 0.4s; }
        .explanation.show { display: block; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
        
        .img-placeholder { background: #f8fafc; border: 2px dashed #cbd5e1; padding: 20px; text-align: center; color: #94a3b8; border-radius: 12px; margin: 15px 0; font-size: 0.85rem; }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="header">
            <h1>Simulado Computabilidade</h1>
            <p>Clique na resposta para validar instantaneamente</p>
        </div>

        <div id="questions-container"></div>

        <div style="text-align: center; margin-top: 40px; opacity: 0.6; padding-bottom: 40px;">
            <p>Foco nos estudos! 🚀</p>
        </div>
    </div>

    <script>
        const questoes = {
            1: {p: "Na análise assintótica, se um algoritmo possui complexidade f(n) = 2n² + 50n + 100, qual sua notação Big O?", o: {A:"O(n)", B:"O(n²)", C:"O(50n)", D:"O(1)"}, c: "B", e: "Ignoramos constantes e termos de menor grau para focar no crescimento assintótico."},
            2: {p: "Qual a complexidade de tempo da Busca Binária?", o: {A:"O(n)", B:"O(n log n)", C:"O(log n)", D:"O(1)"}, c: "C", e: "A cada iteração o espaço de busca é reduzido pela metade (Dividir para Conquistar)."},
            3: {p: "A complexidade O(1) indica que o tempo de execução:", o: {A:"Aumenta linearmente com n", B:"É fixo, independente do tamanho da entrada", C:"Cresce logaritmicamente", D:"Dobra a cada novo elemento"}, c: "B", e: "O tempo de execução é constante."},
            4: {p: "Qual destas ordens de crescimento é a MENOS eficiente para grandes valores de n?", o: {A:"O(n log n)", B:"O(n³)", C:"O(2^n)", D:"O(n!)"}, c: "D", e: "O crescimento fatorial O(n!) ultrapassa rapidamente qualquer exponencial ou polinomial."},
            5: {p: "O algoritmo MinMax (Caso 3) utiliza qual estratégia para ser o mais eficiente?", o: {A:"Busca linear simples", B:"Comparação par-a-par", C:"Ordenação prévia do vetor", D:"Recursão múltipla"}, c: "B", e: "A comparação par-a-par realiza 3n/2 - 2 comparações, sendo a mais otimizada."},
            6: {p: "Qual a complexidade de um algoritmo com dois laços 'for' aninhados, ambos indo de 1 até n?", o: {A:"O(2n)", B:"O(n²)", C:"O(n)", D:"O(log n)"}, c: "B", e: "Como um laço roda dentro do outro, temos n * n = n²."},
            7: {p: "Em análise assintótica, o que significa o 'n' na função f(n)?", o: {A:"Número de variáveis", B:"Tamanho da entrada de dados", C:"Tempo em milissegundos", D:"Número de processadores"}, c: "B", e: "n representa o volume/quantidade de elementos a serem processados."},
            8: {p: "Qual a complexidade de verificar se um número em um vetor é par?", o: {A:"O(1)", B:"O(n)", C:"O(n²)", D:"O(log n)"}, c: "A", e: "É uma operação aritmética única que não depende do tamanho do vetor."},
            9: {p: "Um Autômato Finito Determinístico (AFD) é definido por uma 5-tupla. O que representa o símbolo Σ?", o: {A:"Conjunto de estados", B:"Função de transição", C:"Alfabeto de entrada", D:"Estado inicial"}, c: "C", e: "Sigma define o conjunto finito de símbolos lidos pela máquina."},
            10: {p: "A palavra vazia em linguagens formais é comumente representada por:", o: {A:"Ø", B:"ε (Epsilon)", C:"Σ", D:"∞"}, c: "B", e: "Epsilon representa uma string de comprimento zero."},
            11: {p: "Qual a principal diferença entre a Máquina de Mealy e a de Moore?", o: {A:"Mealy não tem estados finais", B:"Moore depende da entrada para a saída", C:"A saída de Mealy depende da transição (estado e entrada)", D:"Moore é sempre infinita"}, c: "C", e: "Em Mealy a saída é gerada na transição; em Moore, no estado."},
            12: {p: "Um AFD pode estar em quantos estados simultaneamente?", o: {A:"Apenas um", B:"Dois", C:"Infinitos", D:"Depende do alfabeto"}, c: "A", e: "Por ser determinístico, há apenas um caminho possível por vez."},
            13: {p: "O fechamento reflexivo de um alfabeto Σ é denotado por Σ*. O que ele contém?", o: {A:"Apenas palavras infinitas", B:"Todas as palavras possíveis, incluindo a vazia", C:"Apenas números binários", D:"Apenas palavras com um único símbolo"}, c: "B", e: "O fecho de Kleene representa todas as combinações finitas (incluindo ε)."},
            14: {p: "Se um autômato M termina em um estado q que pertence ao conjunto F, dizemos que a palavra foi:", o: {A:"Rejeitada", B:"Aceita", C:"Anulada", D:"Processada"}, c: "B", e: "F é o conjunto de estados finais ou de aceitação."},
            15: {p: "Autômatos Finitos são adequados para reconhecer quais linguagens?", o: {A:"Linguagens Regulares", B:"Linguagens Sensíveis ao Contexto", C:"Linguagens Recursivas", D:"Linguagens Humanas"}, c: "A", e: "AFDs reconhecem a classe das linguagens regulares (gramáticas tipo 3)."},
            16: {p: "Em um grafo de autômato, como é representado o estado inicial?", o: {A:"Círculo duplo", B:"Círculo com uma seta vinda do 'nada'", C:"Um quadrado", D:"Uma linha tracejada"}, c: "B", e: "A seta aponta onde o processamento da cadeia de entrada começa."},
            17: {p: "A Máquina de Turing (MT) é definida por uma 7-upla. O que é o símbolo 'b'?", o: {A:"Símbolo de início", B:"Símbolo branco (fita vazia)", C:"Símbolo de erro", D:"Alfabeto de saída"}, c: "B", e: "O símbolo em branco (blank) indica células não preenchidas da fita."},
            18: {p: "Diferente de um AFD, a Máquina de Turing pode:", o: {A:"Apenas ler", B:"Ler e gravar na fita", C:"Apenas mover para a direita", D:"Processar apenas 0 e 1"}, c: "B", e: "A MT tem capacidade de leitura, escrita e movimento bidirecional."},
            19: {p: "O que afirma a Tese de Church-Turing?", o: {A:"Computadores quânticos são impossíveis", B:"A Máquina de Turing define o limite do que é computável", C:"Todo algoritmo é O(n)", D:"O Problema da Parada tem solução"}, c: "B", e: "Qualquer cálculo/algoritmo executável mecanicamente pode ser simulado por uma MT."},
            20: {p: "Uma MT que nunca entra em loop e sempre aceita ou rejeita uma palavra é chamada de:", o: {A:"Reconhecedora", B:"Decisora", C:"Recursiva", D:"Infinita"}, c: "B", e: "Máquinas decisoras garantem a parada para qualquer entrada finita."},
            21: {p: "Adicionar múltiplas fitas a uma Máquina de Turing:", o: {A:"Aumenta seu poder computacional", B:"Não aumenta o poder, apenas a facilidade/velocidade", C:"Torna a máquina indecidível", D:"Diminui o poder da máquina"}, c: "B", e: "MTs multifitas são equivalentes em poder computacional à MT padrão de uma fita."},
            22: {p: "O que é uma configuração de uma Máquina de Turing?", o: {A:"O estado atual e a posição do cabeçote", B:"Apenas o alfabeto", C:"O estado corrente, conteúdo da fita e posição do cabeçote", D:"O manual de instruções"}, c: "C", e: "A configuração (descrição instantânea) define o estado total da máquina no tempo t."},
            23: {p: "O Problema da Parada (Halting Problem) é:", o: {A:"Decidível", B:"Indecidível", C:"Simples", D:"Linear"}, c: "B", e: "Turing provou que não existe um algoritmo geral para prever se um código para ou entra em loop."},
            24: {p: "Uma linguagem é 'Recursivamente Enumerável' se existe uma MT que:", o: {A:"Sempre para", B:"Aceita se a palavra está na linguagem (pode travar se não estiver)", C:"Nunca aceita nada", D:"Só move para a esquerda"}, c: "B", e: "A máquina reconhece a linguagem, mas não necessariamente a decide (pode não parar para cadeias inválidas)."},
            25: {p: "Quem provou os Teoremas da Incompletude em 1931?", o: {A:"Alan Turing", B:"Kurt Gödel", C:"David Hilbert", D:"Georg Cantor"}, c: "B", e: "Gödel provou que em sistemas formais consistentes existem verdades que não podem ser provadas."},
            26: {p: "O que é o Problema da Aceitação (A_MT)?", o: {A:"Verificar se uma MT aceita uma string w", B:"Verificar se uma MT tem 5 estados", C:"Contar símbolos na fita", D:"Mudar o estado inicial"}, c: "A", e: "É o problema de determinar se uma MT específica aceita uma entrada w."},
            27: {p: "A técnica de Diagonalização foi originalmente criada por quem para comparar infinitos?", o: {A:"Cantor", B:"Hilbert", C:"Church", D:"Moore"}, c: "A", e: "Cantor usou a diagonalização para mostrar que os números reais são incontáveis."},
            28: {p: "Se o Problema A se reduz ao Problema B (A ≤ B) e B é fácil, então:", o: {A:"A é impossível", B:"A também é fácil", C:"A é muito difícil", D:"Nada se conclui"}, c: "B", e: "A redutibilidade permite que a solução de B seja aplicada para resolver A."},
            29: {p: "Um problema é dito 'Indecidível' quando:", o: {A:"O computador quebra", B:"Não existe algoritmo que dê resposta Sim/Não para todos os casos", C:"A resposta é sempre Não", D:"Leva mais de 1 hora para resolver"}, c: "B", e: "Não há um procedimento efetivo de decisão universal para o problema."},
            30: {p: "O Teorema da Recursão permite que uma MT faça o quê?", o: {A:"Calcule 2+2", B:"Obtenha sua própria descrição/código", C:"Apague a fita inteira", D:"Mude o alfabeto de entrada"}, c: "B", e: "Permite que programas obtenham seu próprio código fonte (autorreferência)."},
            31: {p: "O 10º Problema de Hilbert (sobre equações diofantinas) foi provado como:", o: {A:"Fácil", B:"Indecidível", C:"Linear", D:"Recursivo"}, c: "B", e: "Foi provado que não existe algoritmo geral para resolver equações diofantinas."},
            32: {p: "Uma linguagem Recursiva é aquela que:", o: {A:"Tem um loop infinito", B:"É decidida por uma MT", C:"Não pode ser mapeada", D:"É apenas para números"}, c: "B", e: "Linguagens recursivas são aquelas onde a MT sempre para (decidíveis)."},
            33: {p: "Qual o caso base para calcular o Fatorial de n de forma recursiva?", o: {A:"n = 10", B:"n = 0 ou n = 1", C:"n < 0", D:"n = n - 1"}, c: "B", e: "Fatorial de 0 ou 1 é definido como 1 para encerrar as chamadas."},
            34: {p: "A complexidade da Torre de Hanói é O(2^n). Isso significa que se adicionarmos 1 disco, o tempo:", o: {A:"Aumenta 1 segundo", B:"Dobra", C:"Fica igual", D:"Divide por 2"}, c: "B", e: "No crescimento exponencial de base 2, cada incremento em n dobra o esforço."},
            35: {p: "Qual a complexidade de espaço (pilha) do Fibonacci recursivo simples?", o: {A:"O(1)", B:"O(n)", C:"O(2^n)", D:"O(log n)"}, c: "B", e: "A profundidade máxima da pilha de recursão é n."},
            36: {p: "Recursividade Múltipla ocorre quando:", o: {A:"Há um loop dentro da função", B:"A função chama a si mesma mais de uma vez (ex: Fibonacci)", C:"A função nunca para", D:"A função chama outra função diferente"}, c: "B", e: "Ocorre quando há duas ou mais chamadas recursivas no corpo da função."},
            37: {p: "A Soma dos elementos de um vetor de tamanho n feita de forma recursiva tem complexidade:", o: {A:"O(n²)", B:"O(n)", C:"O(log n)", D:"O(1)"}, c: "B", e: "Cada elemento é visitado uma única vez na pilha de recursão."},
            38: {p: "Em C, o que acontece se uma função recursiva não tiver um caso base?", o: {A:"O programa termina com sucesso", B:"Estouro de pilha (Stack Overflow)", C:"O computador reinicia", D:"A variável zera sozinha"}, c: "B", e: "As chamadas acumulam na memória até esgotar o limite da pilha de execução."},
            39: {p: "O algoritmo QuickSort (em média) possui complexidade:", o: {A:"O(n)", B:"O(n log n)", C:"O(n²)", D:"O(1)"}, c: "B", e: "É a complexidade média padrão para ordenação eficiente."},
            40: {p: "A estratégia de 'Dividir para Conquistar' é típica de algoritmos com complexidade:", o: {A:"O(n!)", B:"O(log n) ou O(n log n)", C:"O(2^n)", D:"O(n³)"}, c: "B", e: "Divisões recursivas sucessivas em partes menores geram o comportamento logarítmico."}
        };

        function renderQuestions() {
            const container = document.getElementById('questions-container');
            Object.entries(questoes).forEach(([id, q]) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.id = 'q' + id;
                
                let optionsHTML = '';
                Object.entries(q.o).forEach(([letra, txt]) => {
                    optionsHTML += `
                        <label class="option" id="opt-${id}-${letra}">
                            <input type="radio" name="res${id}" value="${letra}" onchange="selectOption(${id}, '${letra}')">
                            <strong>${letra})</strong> ${txt}
                        </label>
                    `;
                });
                
                card.innerHTML = `
                    <span class="q-text">${id}. ${q.p}</span>
                    <div class="img-placeholder" id="img-${id}">[Foto da Questão ${id} - Adicione foto_q${id}.png na pasta]</div>
                    <div class="options-container">
                        ${optionsHTML}
                    </div>
                    <div class="explanation" id="exp-${id}"></div>
                `;
                
                container.appendChild(card);
            });
        }

        function selectOption(id, letra) {
            const correct = questoes[id].c;
            const explanation = questoes[id].e;
            const expDiv = document.getElementById(`exp-${id}`);
            
            // Desabilita outras opções da mesma questão
            const inputs = document.querySelectorAll(`input[name="res${id}"]`);
            inputs.forEach(input => {
                input.disabled = true;
                const parentLabel = input.parentElement;
                parentLabel.classList.add('disabled');
                
                // Marca a correta de verde
                if (input.value === correct) {
                    parentLabel.classList.add('correct');
                }
            });

            // Se errou, marca a selecionada de vermelho
            if (letra !== correct) {
                const selectedLabel = document.getElementById(`opt-${id}-${letra}`);
                selectedLabel.classList.add('wrong');
                expDiv.classList.add('error');
                expDiv.style.background = '#fee2e2';
                expDiv.innerHTML = `<strong>✗ Errado.</strong> A resposta correta é <strong>${correct}</strong>.<br>${explanation}`;
            } else {
                expDiv.classList.add('success');
                expDiv.style.background = '#dcfce7';
                expDiv.innerHTML = `<strong>✓ Correto!</strong><br>${explanation}`;
            }

            expDiv.classList.add('show');
        }

        renderQuestions();
    </script>
</body>
</html>
